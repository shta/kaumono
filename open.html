<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>買うものメモで開く</title>
</head>
<body>
  <main>
    <h1>買うものメモで開く</h1>
    <p>アプリがインストールされている場合は、下のボタンから開けます。</p>

    <button id="open-app">買うものメモで開く</button>

    <p>
      開けない場合は、共有テキスト全体をコピーして、
      アプリ内の「＋」→「共有テキストから取り込む」から貼り付けてください。
    </p>
  </main>

  <script>
    const hash = new URLSearchParams(location.hash.slice(1));
    const payload = hash.get("t") || "";

    document.getElementById("open-app").addEventListener("click", () => {
      const appURL = payload
        ? `kaumonomemo://import?t=${encodeURIComponent(payload)}`
        : "kaumonomemo://import";

      location.href = appURL;
    });
  </script>
</body>
</html>
